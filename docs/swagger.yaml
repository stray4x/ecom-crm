basePath: /
definitions:
  dto.AuthResponse:
    properties:
      accessToken:
        type: string
      csrfToken:
        type: string
      customer:
        $ref: '#/definitions/dto.CustomerResponse'
    type: object
  dto.CustomerResponse:
    properties:
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      lastName:
        type: string
      phone:
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LogoutResponse:
    properties:
      success:
        type: boolean
    type: object
  dto.RefreshTokenResponse:
    properties:
      accessToken:
        type: string
      csrfToken:
        type: string
    type: object
  dto.RegisterCustomerRequest:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
host: localhost:8080
info:
  contact: {}
  description: E-commerce CRM service
  title: Ecommerce CRM API
  version: "1.0"
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user. Server sets cookies (refresh_token, csrf_token).
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: refresh_token httpOnly
              type: string
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login existing customer
      tags:
      - auth
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: refresh_token httpOnly; Max-Age=0
              type: string
          schema:
            $ref: '#/definitions/dto.LogoutResponse'
      summary: Logout customer
      tags:
      - auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates new customer account. Server sets cookies (refresh_token,
        csrf_token)
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register new customer
      tags:
      - auth
  /v1/auth/token/refresh:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
swagger: "2.0"
